name: Render Keepalive Ping

# Pings the Render server every 10 minutes to prevent free-tier sleep.
# Without this, the server sleeps after 15 min inactivity and
# WhatsApp webhooks fail during the 30s cold-start.

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes, 24/7
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 20 \
            "https://apartment-mgmt-odessa.onrender.com/api/health")
          echo "Response: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 500 ]; then
            echo "Warning: server returned $STATUS"
          fi
